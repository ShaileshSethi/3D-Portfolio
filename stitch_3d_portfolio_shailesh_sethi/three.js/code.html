<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_10 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_10" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_10');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Group for the floating vinyl
  const musicGroup = new THREE.Group();
  scene.add(musicGroup);

  // Vinyl Record
  const vinylMaterial = new THREE.MeshPhongMaterial({ 
    color: 0x111111, 
    shininess: 90,
    specular: 0x333333
  });
  const discGeo = new THREE.CylinderGeometry(2, 2, 0.05, 128);
  const disc = new THREE.Mesh(discGeo, vinylMaterial);
  musicGroup.add(disc);

  // Label
  const labelGeo = new THREE.CylinderGeometry(0.75, 0.75, 0.06, 64);
  const labelMaterial = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
  const label = new THREE.Mesh(labelGeo, labelMaterial);
  musicGroup.add(label);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambientLight);

  const mainLight = new THREE.DirectionalLight(0x8888ff, 1.5);
  mainLight.position.set(5, 5, 5);
  scene.add(mainLight);

  const accentLight = new THREE.PointLight(0xff00ff, 1, 10);
  accentLight.position.set(-3, 2, 2);
  scene.add(accentLight);

  camera.position.set(0, 4, 8);
  camera.lookAt(0, 0, 0);

  // Floating particles
  const particlesCount = 200;
  const posArray = new Float32Array(particlesCount * 3);
  for(let i = 0; i < particlesCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 15;
  }
  const particlesGeo = new THREE.BufferGeometry();
  particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
  const particlesMaterial = new THREE.PointsMaterial({ size: 0.05, color: 0x8888ff, transparent: true, opacity: 0.8 });
  const particles = new THREE.Points(particlesGeo, particlesMaterial);
  scene.add(particles);

  // Interaction
  let mouseX = 0, mouseY = 0;
  window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX - window.innerWidth / 2) * 0.001;
    mouseY = (e.clientY - window.innerHeight / 2) * 0.001;
  });

  function animate() {
    requestAnimationFrame(animate);
    
    const time = Date.now() * 0.001;
    
    // Floating motion
    musicGroup.position.y = Math.sin(time) * 0.2;
    musicGroup.rotation.y += 0.01;
    musicGroup.rotation.x = Math.cos(time * 0.5) * 0.1;
    
    // Mouse follow
    musicGroup.rotation.z += (mouseX - musicGroup.rotation.z) * 0.1;
    camera.position.x += (mouseX * 2 - camera.position.x) * 0.05;
    camera.lookAt(0, 0, 0);

    particles.rotation.y += 0.001;

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });
})();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_10 -->
</body>
</html>
